<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Website</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Interactive Quiz Application</h1>
<p>Test Your Knowledge</p>
</header>

<nav>
<ul>
<li><a href="#">Home</a></li>
<li><a href="#">Quiz</a></li>
<li><a href="#">Score</a></li>
<li><a href="#">Contact</a></li>
</ul>
</nav>

<main>

<section class="quiz-box">

<h2 id="question"></h2>

<progress id="progressBar" value="1" max="5"></progress>

<p id="timer">Time Left: 15 sec</p>

<div class="options">
<label><input type="radio" name="answer" value="0">
<span id="opt0"></span></label>

<label><input type="radio" name="answer" value="1">
<span id="opt1"></span></label>

<label><input type="radio" name="answer" value="2">
<span id="opt2"></span></label>

<label><input type="radio" name="answer" value="3">
<span id="opt3"></span></label>
</div>

<button onclick="nextQuestion()">
Submit Answer
</button>

</section>

<aside>
<h3>Instructions</h3>
<ul>
<li>Select one answer</li>
<li>Complete in time</li>
<li>Submit each answer</li>
</ul>
</aside>

</main>

<footer>
<p>© 2024 Quiz Website</p>
</footer>

<script src="script.js"></script>

</body>
</html>
